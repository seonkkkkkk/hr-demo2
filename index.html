  const o=ORGS.find(x=>x.id===id)||{hqCode:"",hqName:"",teamCode:"",teamName:"",leader:"",mainWork:""};
  const key=(id||"new").replace(/[^0-9a-zA-Z]/g,"x");
  openM(mH(id?"조직 편집":"조직 추가")+`
  <div class="fr"><div class="fg"><label>본부코드</label><input id="ohqc" value="${o.hqCode}"></div><div class="fg"><label>본부명</label><input id="ohqn" value="${o.hqName}"></div></div>
  <div class="fr"><div class="fg"><label>팀코드</label><input id="otmc" value="${o.teamCode}"></div><div class="fg"><label>팀명</label><input id="otmn" value="${o.teamName}"></div></div>
  <div class="fr"><div class="fg"><label>팀장</label><input id="oldr" value="${o.leader}"></div><div class="fg"><label>주요업무</label><input id="owrk" value="${o.mainWork}"></div></div>
  `+mF(`_saveOrg_${key}`));
  window[`_saveOrg_${key}`]=()=>{
    const data={id:id||nid("O",ORGS),hqCode:v("ohqc"),hqName:v("ohqn"),teamCode:v("otmc"),teamName:v("otmn"),leader:v("oldr"),mainWork:v("owrk")};
    const i=ORGS.findIndex(x=>x.id===id);if(i>-1)ORGS[i]=data;else ORGS.push(data);
    closeM();saveAll();render();
  };
}

function renderNav(){

          <td><b>${y[4]?won(y[4]):"-"}</b></td>
          <td style="color:#2563eb;font-weight:600;font-size:10px">${rate(y[3],y[4])}</td>
          <td><b style="color:#7c3aed">${cagr(y)}</b></td>
          ${mc("trend_"+e.id,"메모...")}
          <td><button class="btn btn-edit" onclick="editTrend('${e.id}')">편집</button></td>
        </tr>`;
      })
    )}</div>
    <div class="card"><div class="ch">5년 연봉 추이 시각화</div><div style="padding:14px">${emps.map(e=>{const t=TREND.find(x=>x.empId===e.id)||{y:[0,0,0,0,0]};const mx=Math.max(...t.y)||1;const mn=Math.min(...t.y.filter(val=>val>0))||0;return`<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><b style="font-size:11px;width:60px">${e.name}</b><span style="font-size:10px;color:#64748b">CAGR ${cagr(t.y)}</span></div><div class="trend-bar">${t.y.map((val,i)=>`<div class="trend-col"><div class="trend-fill" style="height:${val?Math.round(pct(val-mn+300,mx-mn+300)*0.4+4):3}px;background:${val?"#3b82f6":"#e2e8f0"}"></div><div class="trend-lbl">${yrs[i].toString().slice(2)}</div></div>`).join("")}</div></div>`;}).join("")}</div></div>`;
  }
}


// ── 내보내기 / 가져오기 ──────────────────────────────────

// 📤 현재 데이터가 박힌 HTML 파일 생성 & 다운로드
function exportHTML(){
  // 현재 데이터를 JSON 직렬화
  const data={EMP,ORGS,PERSONAL,CERTS,EDUS,LEAVE,CONST,SAL,CAREER,KPI,TREND,MEMOS};
  const dataStr=JSON.stringify(data);
  // 현재 HTML 읽기
  const xhr=new XMLHttpRequest();
  xhr.open("GET",location.href,false);
  try{xhr.send();}catch(e){}
  let src=xhr.responseText||document.documentElement.outerHTML;
  // DEF_ 데이터 다음에 현재 데이터 로드 코드 삽입
  // localStorage 로드 부분을 현재 데이터로 고정
  const inject=`\n// ── 내보내기 데이터 (자동 생성) ──\nconst _EXPORTED=${dataStr};\n`;
  const markerOld="const sv=localStorage.getItem(SKEY);const SD=sv?JSON.parse(sv):null;";
  const markerNew=`const sv=localStorage.getItem(SKEY);const SD=sv?JSON.parse(sv):_EXPORTED;`;
  if(src.includes(markerOld)){
    src=src.replace(markerOld, inject+markerNew);
  }
  // 파일 다운로드
  const blob=new Blob([src],{type:"text/html;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  const today=new Date().toISOString().slice(0,10).replace(/-/g,"");
  a.download=`아키테크_인사관리_${today}.html`;
  a.click();
  URL.revokeObjectURL(a.href);
  alert("✅ 데이터 포함 HTML 파일이 저장되었습니다.\n이 파일을 전달하면 동일한 데이터로 열립니다.");
}

// 📥 JSON 가져오기
function importJSON(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.EMP){alert("올바른 형식의 JSON 파일이 아닙니다.");return;}
      if(!confirm(`데이터를 가져오면 현재 데이터가 덮어씌워집니다.\n직원 ${d.EMP.length}명 · 자격증 ${d.CERTS.length}건\n계속할까요?`))return;
      EMP=d.EMP||EMP;ORGS=d.ORGS||ORGS;PERSONAL=d.PERSONAL||PERSONAL;
      CERTS=d.CERTS||CERTS;EDUS=d.EDUS||EDUS;LEAVE=d.LEAVE||LEAVE;
      CONST=d.CONST||CONST;SAL=d.SAL||SAL;CAREER=d.CAREER||CAREER;
      KPI=d.KPI||KPI;TREND=d.TREND||TREND;MEMOS=d.MEMOS||MEMOS;
      saveAll();render();
      alert(`✅ 데이터를 성공적으로 가져왔습니다.\n직원 ${EMP.length}명 로드 완료`);
    }catch(err){alert("JSON 파일 읽기 오류: "+err.message);}
  };
  reader.readAsText(file,"utf-8");
  event.target.value="";
}

function render(){renderNav();renderMain();}
render();
